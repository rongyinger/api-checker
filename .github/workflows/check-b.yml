name: B端 API Model Check

on:
  schedule:
    - cron: "30 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-b:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run B-end checker
        run: python checker-b.py

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/data-b.csv
          git diff --staged --quiet || git commit -m "chore: update b-end data $(date +'%Y-%m-%d %H:%M')"
          git push
