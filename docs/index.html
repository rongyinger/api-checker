<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>算力·模型测试平台</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: linear-gradient(135deg, #0a0f1e 0%, #0d1b2a 40%, #0a1628 70%, #060d1a 100%);
  background-attachment: fixed;
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Arial, sans-serif;
  color: #e6e6ea;
}

/* ── Background glow orbs ── */
@keyframes drift-h {
  from { transform: translateX(0);    }
  to   { transform: translateX(45px); }
}
@keyframes drift-v {
  from { transform: translateY(0);     }
  to   { transform: translateY(-55px); }
}
@keyframes drift-d {
  from { transform: translate(0, 0);        }
  to   { transform: translate(32px, -32px); }
}
.glow {
  position: fixed;
  z-index: 0;
  pointer-events: none;
  border-radius: 50%;
  will-change: transform;
}
.glow-tl {
  width: 600px; height: 600px;
  top: -100px; left: -100px;
  background: rgba(0,120,200,0.15);
  filter: blur(120px);
  animation: drift-h 18s ease-in-out infinite alternate;
}
.glow-br {
  width: 600px; height: 600px;
  bottom: -100px; right: -100px;
  background: rgba(120,60,220,0.12);
  filter: blur(120px);
  animation: drift-v 15s ease-in-out infinite alternate;
}
.glow-mc {
  width: 500px; height: 500px;
  top: 30%; right: 20%;
  background: rgba(0,180,150,0.08);
  filter: blur(100px);
  animation: drift-d 20s ease-in-out infinite alternate;
}

/* ── Center layout ── */
.center {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  text-align: center;
  padding: 40px 20px;
}

.platform-title {
  font-size: 28px;
  font-weight: 500;
  color: #ffffff;
  letter-spacing: -0.02em;
}

.platform-sub {
  margin-top: 12px;
  font-size: 14px;
  color: rgba(255,255,255,0.5);
}

/* ── Entry buttons ── */
.btn-row {
  display: flex;
  align-items: center;
  gap: 32px;
  margin-top: 40px;
  flex-wrap: wrap;
  justify-content: center;
}

.entry-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 220px;
  height: 64px;
  border-radius: 50px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.15);
  text-decoration: none;
  cursor: pointer;
  transition: background 0.25s ease, border-color 0.25s ease, transform 0.25s ease;
}

.entry-btn:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.3);
  transform: translateY(-2px);
}

.btn-label {
  font-size: 18px;
  font-weight: 500;
  color: #ffffff;
  line-height: 1.2;
}

.btn-desc {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  margin-top: 3px;
  line-height: 1;
}
</style>
</head>
<body>

<div class="glow glow-tl"></div>
<div class="glow glow-br"></div>
<div class="glow glow-mc"></div>

<div class="center">
  <div class="platform-title">算力·模型测试平台</div>
  <div class="platform-sub">选择测试环境进入</div>

  <div class="btn-row">
    <a href="dashboard-c.html" class="entry-btn">
      <span class="btn-label">C端模型测试</span>
      <span class="btn-desc">面向消费者的通用模型</span>
    </a>
    <a href="dashboard-b.html" class="entry-btn">
      <span class="btn-label">B端模型测试</span>
      <span class="btn-desc">企业级接口专项测试</span>
    </a>
  </div>
</div>

</body>
</html>
